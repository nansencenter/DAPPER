name: Deploy docs
on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv pip install -e '.[doc]' --system
      - run: mkdocs build -f properdocs.yml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - id: deploy
        uses: actions/deploy-pages@v4
